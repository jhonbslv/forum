<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Post</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
    <h1>Editar Post</h1>

    <div class="form-box">
        <form action="/edit/{{ post.id }}" method="post">
            <input type="text" name="titulo" value="{{ post.titulo }}" required>
            <input type="text" name="resumo" value="{{ post.resumo }}" required>
            <textarea name="conteudo" rows="8" required>{{ post.conteudo }}</textarea>
            <input type="text" name="autor" value="{{ post.autor }}" required>

            <button type="submit">Atualizar</button>
            <a href="/">Cancelar</a>
        </form>
    </div>
</div>
</body>
</html>
